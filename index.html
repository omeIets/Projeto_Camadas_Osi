<!DOCTYPE html>
<html lang="pt-br">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="./style/reset.css">
  <link rel="stylesheet" href="./style/global.css">
  <link rel="stylesheet" href="./style/header.css">
  <link rel="stylesheet" href="./style/main.css">
  
  <!-- Fontes -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Audiowide&family=Poppins:wght@300;400;700&display=swap" rel="stylesheet">
  
  <!-- Ícones -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

  <title>Torre OSI - Maria Letícia</title>
</head>

<body>
  <header class="head">
    <div class="user-wrapper">
      <i class="fa-solid fa-user-astronaut icon"></i>
      <p class="user" id="userNameDisplay">Carregando...</p>
    </div>
    <h1 class="title">TORRE OSI</h1>
    <div class="header-right">
      <div class="status-led"></div>
      <button id="btn-logout" class="logout-btn">Trocar Usuário</button>
    </div>
  </header>

  <main class="main">
    <!-- Fundo da Cidade Cyberpunk -->
    <div class="city-bg"></div>

    <!-- Torre -->
    <div class="tower-container">
      <!-- Camada 7 (Aplicação) - Visor -->
      <div class="layer layer-top">
        <div class="display-screen">
          <div class="screen-header">
            <span class="sys-status">SISTEMA &gt; CONECTADO</span>
            <i class="fa-solid fa-circle-check green-dot"></i>
          </div>
          <h1 class="protocol-name" id="protocolDisplay">AGUARDANDO REQUISIÇÃO...</h1>
          <div class="scanline"></div>
        </div>
      </div>


      <div class="layer layer-mid-1">
        <i class="fa-solid fa-network-wired neon-icon"></i>
        <i class="fa-solid fa-lock neon-icon"></i>
        <i class="fa-solid fa-globe neon-icon"></i>
      </div>
      
      <div class="layer layer-mid-2">
        <i class="fa-solid fa-shield-halved neon-icon-pink"></i>
        <i class="fa-solid fa-server neon-icon-pink"></i>
      </div>

      <!-- Camada Base (Painel de Controle) -->
      <div class="layer layer-base">
        <div class="control-panel">
          <div class="row-inputs">
            <div class="input-group">
              <label>CMD &gt; DIGITE A URL/EMAIL:</label>
              <div class="input-container">
                <input type="text" id="requestInput" class="text-input glow-input" placeholder="www.site.com ou email@teste.com">
                <button class="request-btn glow-btn">
                  <i class="fa-solid fa-arrow-right-to-bracket"></i> EXECUTAR
                </button>
              </div>
            </div>
            <div class="file-upload-wrapper">
              <label for="arquivo" class="custom-file-upload">
                <i class="fa-solid fa-upload"></i> ANEXAR ARQUIVO
                <input type="file" id="arquivo">
              </label>
            </div>
          </div>
        </div>
      </div>

    </div>

    <!-- ===== FORMULÁRIO DE E-MAIL (SMTP) ===== -->
    <form class="email-form hidden osi-form">
      <h2 class="form-title">📧 Simulador de Envio (SMTP)</h2>

      <div class="form-group">
        <label for="remetente">Remetente:</label>
        <input type="email" id="remetente" class="input-field" placeholder="exemplo@email.com" required>
      </div>

      <div class="form-group">
        <label for="destinatario">Destinatário:</label>
        <input type="email" id="destinatario" class="input-field" placeholder="destino@email.com" required>
      </div>

      <div class="form-group">
        <label for="assunto">Assunto:</label>
        <input type="text" id="assunto" class="input-field" placeholder="Assunto do e-mail" required>
      </div>

      <div class="form-group">
        <label for="corpo">Corpo da Mensagem:</label>
        <textarea id="corpo" class="input-field textarea-field" placeholder="Digite sua mensagem..." required></textarea>
      </div>

      <div class="form-group">
        <label for="protocolo">Protocolo:</label>
        <input type="text" id="protocolo" class="input-field" value="SMTP" readonly>
      </div>

      <button type="submit" class="request-btn glow-btn">Enviar E-mail</button>
    </form>

    <!-- ===== FORMULÁRIO DE CHAT (WebSocket) ===== -->
    <form class="chat-form hidden osi-form">
      <h2 class="form-title">💬 Simulador de Chat (WebSocket)</h2>

      <div class="form-group">
        <label for="chat-destinatario">Enviar para (Destinatário):</label>
        <input type="text" id="chat-destinatario" class="input-field" placeholder="Nome do amigo ou grupo..." required>
      </div>

      <div class="form-group">
        <label for="chat-mensagem">Mensagem do Chat:</label>
        <textarea id="chat-mensagem" class="input-field textarea-field" placeholder="Digite a mensagem do chat..." required></textarea>
      </div>

      <button type="submit" class="request-btn glow-btn">Enviar Mensagem</button>
    </form>

    <!-- ===== FORMULÁRIO WEB (HTTP/HTTPS) ===== -->
    <form class="site-form hidden osi-form">
      <h2 class="form-title">🌐 Simulador de Requisição Web (HTTP/HTTPS)</h2>

      <div class="form-group">
        <label for="site-metodo">Método HTTP:</label>
        <select id="site-metodo" class="input-field">
          <option value="GET">GET</option>
          <option value="POST">POST</option>
          <option value="PUT">PUT</option>
          <option value="DELETE">DELETE</option>
        </select>
      </div>

      <div class="form-group">
        <label for="site-host">Host / IP Detectado:</label>
        <input type="text" id="site-host" class="input-field" readonly>
      </div>

      <button type="submit" class="request-btn glow-btn">Enviar Requisição HTTP</button>
    </form>

    <!-- Linhas de energia -->
    <div class="energy-lines"></div>
  </main>

  <!-- Script único de entrada -->
  <script type="module" src="./scripts/application.js"></script>
</body>
</html>
