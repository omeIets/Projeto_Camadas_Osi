<!DOCTYPE html>
<html lang="pt-br">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="./style/reset.css">
  <link rel="stylesheet" href="./style/global.css">
  <link rel="stylesheet" href="./style/header.css">
  <link rel="stylesheet" href="./style/main.css">
  <link rel="stylesheet" href="./style/resultado.css">
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Audiowide&family=Poppins:wght@300;400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

  <title>Resultado da Transmissão — Torre OSI</title>
</head>

<body>
  <header class="head">
    <div class="user-wrapper">
      <i class="fa-solid fa-user-astronaut icon"></i>
      <p class="user" id="userNameDisplay">—</p>
    </div>
    <h1 class="title">TORRE OSI</h1>
    <div class="header-right">
      <div class="status-led"></div>
    </div>
  </header>

  <main class="main resultado-main">
    <div class="energy-lines"></div>

    <div class="resultado-container">
      <h1 class="resultado-titulo">📡 Simulação Completa do Modelo OSI</h1>
      <h2 class="resultado-subtitulo">Dados Processados pelas Camadas</h2>

      <div id="dados-conteudo" class="dados-box"></div>

      <!-- Canvas da Camada de Rede -->
      <div class="network-container">
        <h2 class="network-title">🗺 Camada de Rede — Dijkstra</h2>
        <canvas id="networkCanvas" width="1000" height="600"></canvas>
      </div>

      <a href="index.html" class="request-btn glow-btn voltar-btn">
        <i class="fa-solid fa-rotate-left"></i> Voltar
      </a>
    </div>
  </main>

  <script type="module" src="scripts/resultado.js"></script>
</body>
</html>
